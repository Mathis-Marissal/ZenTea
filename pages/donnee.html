<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/profile.css">
    <title>ZenTea - Données personnelles</title>
</head>
<body>
    
    <header>

        <div class="off-screen-menu">
            <ul>
                <li><a href="/pages/thevert.html">Thé Vert</a></li>
                <li><a href="/pages/thenoir.html">Thé Noir</a></li>
                <li><a href="/pages/matcha.html">Matcha</a></li>
                <li><a href="/pages/tisane.html">Tisane</a></li>
            </ul>
        </div>
        
        <div class="profileNavBar">
            <div class="profileNav"><a href="javascript:history.back()"><img src="/assets/img/arrowbackmobile.svg" alt="fléche retour (vers la gauche)"></a></div>
            <div class="profileNav"><h3>Données personnelles</h3></div>
            <div class="profileNav"></div>
        </div>

        <nav class="zenteaNav">

            <div class="logo">
                <a href="/index.html"><img src="/assets/img/Logo.png" alt=""></a>
            </div>

            <ul class="desktop-menu">
                <li><a href="/pages/thevert.html">Thé Vert</a></li>
                <li><a href="/pages/thenoir.html">Thé Noir</a></li>
                <li><a href="/pages/matcha.html">Matcha</a></li>
                <li><a href="/pages/tisane.html">Tisane</a></li>
            </ul>

            <div class="icons">
                <div class="ham-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <a href="#" class="user-icon"><img src="/assets/img/profile.png" alt=""></a>
                <a href="#" class="cart-icon"><img src="/assets/img/panier.png" alt=""></a>
            </div>
        </nav>
    </header>

    <main>

        <div class="block">

            <div class="donneeInfo">

                <div>
                    <label>Prénom</label>
                    <div class="input-wrapper">
                        <input type="text" placeholder="Martin">
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>
                </div>

                <div>
                    <label>Nom</label>
                    <div class="input-wrapper">
                        <input type="text" placeholder="Dupont">
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>
                </div>

                <div>
                    <label>Téléphone</label>
                    <div class="input-wrapper">
                        <input class="input" type="tel" id="phone" pattern="[0-9]{10}" maxlength="10" placeholder="03 13 07 20 05" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>
                </div>



            </div>

            <div class="donneeEmail">
                <h4>Votre adresse email</h4>
                <p>contact@zentea.com</p>
            </div>


            <div class="change">

                <div class="changeEmail">

                    <label>Changer votre adresse email</label>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Nouvelle adresse email" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Confirmation de votre nouvelle adresse email" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Votre mot de passe actuel" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="btn-container">
                        <button type="submit" class="btn-envoyer">Envoyer</button>
                    </div>

                </div>

                <div class="changeEmail">

                    <label>Changer votre mot de passe</label>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Ancien mot de passe" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Nouveau mot de passe" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="input-wrapper">
                        <input type="text" placeholder="Confirmation de votre nouveau mot de passe" required>
                        <button class="clear-btn" onclick="this.previousElementSibling.value=''">✕</button>
                    </div>

                    <div class="btn-container">
                        <button type="submit" class="btn-envoyer">Envoyer</button>
                    </div>

                </div>

            </div>


        </div>

    </main>

    <!-- footer -->
    <footer class="footer">
        <div class="footer-top">

            <!-- Logo -->
            <div class="footer-logo">
                <img src="/assets/img/Logo.png" alt="ZenTea">
            </div>

            <!-- Les liens -->
            <div class="footer-links">
                <a href="/pages/aboutus.html">A propos de nous</a>
                <a href="/pages/pdc.html">Politique de confidentialité</a>
                <a href="/pages/cgv.html">Condition générales de vente</a>
                <a href="/pages/profile.html">Mon compte</a>
                <a href="/pages/panier.html">Panier</a>
                <a href="/pages/support.html">Support</a>
            </div>

            <!-- Réseaux sociaux -->
            <div class="footer-socials">
                <a href="https://x.com/?lang=fr"><img src="/assets/img/twitter.png" alt="twitter"></a>
                <a href="https://www.instagram.com/"><img src="/assets/img/instagram.png" alt="instagram"></a>
                <a href="https://www.tiktok.com/fr/"><img src="/assets/img/tiktok.png" alt="tik tok"></a>
                <a href="https://www.youtube.com/"><img src="/assets/img/youtube.png" alt="youtube" class="youtube"></a>
            </div>
        </div>

        <!-- le truc la -->
        <div class="footer-bottom">
            <p>© zentea.com. Tout droits réservés</p>
        </div>
    </footer>

    <script src="/assets/js/main.js"></script>
</body>
</html>
